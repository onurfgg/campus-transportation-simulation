<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO 130 | V7 Mühendislik Paneli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --accent: #3498db; --bg-glass: rgba(255, 255, 255, 0.85); --text: #2c3e50; }
        body { margin: 0; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: #cce0ff; }
        
        #canvas-container { position: absolute; width: 100vw; height: 100vh; z-index: 0; }

        /* Sol Kenar Paneli - Görüşü Kapatmayan Tasarım */
        .sidebar {
            position: absolute; top: 20px; left: 20px; width: 300px; z-index: 10;
            background: var(--bg-glass); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        h1 { font-size: 16px; margin: 0 0 15px 0; color: var(--text); border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        .val-disp { float: right; color: var(--accent); font-weight: 800; }

        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .kpi-box { background: #fff; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .kpi-title { font-size: 9px; color: #888; font-weight: bold; }
        .kpi-val { font-size: 18px; font-weight: 800; color: var(--text); }

        /* Grafik Alanı - Sol Alt */
        #chart-container {
            position: absolute; bottom: 20px; left: 20px; width: 340px; height: 160px;
            background: var(--bg-glass); backdrop-filter: blur(8px);
            border-radius: 12px; padding: 10px; z-index: 10; border: 1px solid rgba(255,255,255,0.3);
        }

        #status-tag { 
            display: inline-block; margin-top: 10px; padding: 4px 8px; border-radius: 4px; 
            font-size: 10px; font-weight: bold; color: white; width: 100%; text-align: center;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="sidebar">
    <h1>📊 EGO 130 Operasyonel İzleme</h1>
    
    <div class="control-group">
        <label>Varış Hızı (λ) <span class="val-disp" id="l-v">18</span></label>
        <input type="range" id="l-in" min="1" max="100" value="18">
    </div>
    <div class="control-group">
        <label>Sefer Sıklığı <span class="val-disp" id="i-v">3</span></label>
        <input type="range" id="i-in" min="1" max="15" value="3">
    </div>
    <div class="control-group">
        <label>Otobüs Kapasitesi <span class="val-disp" id="c-v">78</span></label>
        <input type="range" id="c-in" min="50" max="300" value="78">
    </div>

    <div class="kpi-grid">
        <div class="kpi-box">
            <div class="kpi-title">YOĞUNLUK (ρ)</div>
            <div class="kpi-val" id="rho-val">0.69</div>
        </div>
        <div class="kpi-box">
            <div class="kpi-title">KUYRUK</div>
            <div class="kpi-val" id="q-val">0</div>
        </div>
    </div>
    <div id="status-tag" style="background: #2ecc71;">✅ SİSTEM KARARLI</div>
</div>

<div id="chart-container"></div>

<script>
    // --- KONFİGÜRASYON ---
    let state = { lambda: 18, interval: 3, capacity: 78, queue: 0, time: 0, history: [] };
    let busState = "idle"; // idle, arriving, boarding, departing
    let busTimer = 0;
    const busSpeed = 1.8; 

    // --- D3.js GRAFİK KURULUMU ---
    const chartW = 320, chartH = 140;
    const svgChart = d3.select("#chart-container").append("svg").attr("width", chartW).attr("height", chartH);
    const xChart = d3.scaleLinear().domain([0, 60]).range([30, chartW-10]);
    const yChart = d3.scaleLinear().domain([0, 200]).range([chartH-20, 10]);
    
    const xAxis = svgChart.append("g").attr("transform", `translate(0,${chartH-20})`).style("font-size", "8px").call(d3.axisBottom(xChart).ticks(5));
    const yAxis = svgChart.append("g").attr("transform", "translate(30,0)").style("font-size", "8px").call(d3.axisLeft(yChart).ticks(4));
    const linePath = svgChart.append("path").attr("fill", "none").attr("stroke", "#3498db").attr("stroke-width", 2);

    function updateDashboard() {
        const rho = (state.lambda * state.interval) / state.capacity;
        document.getElementById("l-v").innerText = state.lambda;
        document.getElementById("i-v").innerText = state.interval;
        document.getElementById("c-v").innerText = state.capacity;
        document.getElementById("q-val").innerText = state.queue;
        document.getElementById("rho-val").innerText = rho.toFixed(2);

        const isUnstable = rho >= 1;
        const tag = document.getElementById("status-tag");
        tag.innerText = isUnstable ? "⚠️ DARBOĞAZ (KRİTİK)" : "✅ SİSTEM KARARLI";
        tag.style.background = isUnstable ? "#e74c3c" : "#2ecc71";

        // Grafik Güncelleme
        if(state.time > 60) xChart.domain([state.time - 60, state.time]);
        yChart.domain([0, Math.max(200, d3.max(state.history, d => d.q) * 1.1 || 0)]);
        xAxis.call(d3.axisBottom(xChart).ticks(5));
        yAxis.call(d3.axisLeft(yChart).ticks(4));
        linePath.datum(state.history).attr("d", d3.line().x(d => xChart(d.t)).y(d => yChart(d.q)));
    }

    // --- THREE.JS 3D MOTORU ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xddebf7);
    const camera = new THREE.OrthographicCamera(-70, 70, 40, -40, 1, 1000);
    camera.position.set(50, 50, 50); camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(40, 60, 20); sun.castShadow = true;
    scene.add(sun);

    // Çevre (Yol ve Kaldırım)
    const road = new THREE.Mesh(new THREE.PlaneGeometry(1000, 40), new THREE.MeshStandardMaterial({color: 0x333333}));
    road.rotation.x = -Math.PI/2; road.receiveShadow = true; scene.add(road);
    
    const curb = new THREE.Mesh(new THREE.BoxGeometry(200, 2, 25), new THREE.MeshStandardMaterial({color: 0x999999}));
    curb.position.set(0, 1, -30); curb.receiveShadow = true; scene.add(curb);

    // Otobüs Grubu ve Gelişmiş Tekerlekler
    const busGroup = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(36, 12, 11), new THREE.MeshStandardMaterial({color: 0xf1c40f}));
    body.position.y = 8; body.castShadow = true; busGroup.add(body);
    
    const glass = new THREE.Mesh(new THREE.BoxGeometry(34, 5, 11.2), new THREE.MeshStandardMaterial({color: 0x222222}));
    glass.position.y = 10; busGroup.add(glass);

    const wheelGeo = new THREE.CylinderGeometry(2.8, 2.8, 2, 16);
    const wheelMat = new THREE.MeshStandardMaterial({color: 0x111111});
    const wheelRefs = [];
    [[-12, 2.8, 5.8], [12, 2.8, 5.8], [-12, 2.8, -5.8], [12, 2.8, -5.8]].forEach(p => {
        const wGroup = new THREE.Group();
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI/2; w.castShadow = true;
        wGroup.add(w); wGroup.position.set(...p);
        busGroup.add(wGroup); wheelRefs.push(w);
    });
    busGroup.position.set(-200, 0, 5); scene.add(busGroup);

    // Öğrenciler (2x2 Düzen)
    const students = [];
    const stuGeo = new THREE.CylinderGeometry(0.8, 0.8, 4, 8);
    const stuMat = new THREE.MeshStandardMaterial({color: 0x3498db});
    for(let i=0; i<300; i++){
        const s = new THREE.Mesh(stuGeo, stuMat); s.castShadow = true; s.visible = false;
        scene.add(s); students.push(s);
    }

    function updateSim() {
        state.time++;
        state.queue += state.lambda;
        state.history.push({t: state.time, q: state.queue});
        if(state.time > 0 && state.time % state.interval === 0 && busState === "idle") busState = "arriving";
        updateDashboard();
    }
    setInterval(updateSim, 1000);

    function animate() {
        requestAnimationFrame(animate);
        
        // Otobüs Fiziği (İvmelenme/Fren)
        if(busState === "arriving"){
            busGroup.position.x += (0 - busGroup.position.x) * 0.05;
            wheelRefs.forEach(w => w.rotation.x -= 0.15);
            if(busGroup.position.x > -0.5) {
                busState = "boarding";
                setTimeout(() => {
                    state.queue = Math.max(0, state.queue - state.capacity);
                    busState = "departing";
                }, 1000);
            }
        } else if(busState === "departing") {
            busGroup.position.x += busTimer * 0.1; busTimer += 0.2;
            wheelRefs.forEach(w => w.rotation.x -= busTimer * 0.05);
            if(busGroup.position.x > 250) { busGroup.position.x = -250; busState = "idle"; busTimer = 0; }
        }

        // Öğrenci Pozisyonları (Yumuşak Sıra)
        students.forEach((s, i) => {
            if(i < state.queue) {
                s.visible = true;
                const row = Math.floor(i/2), col = i%2;
                s.position.lerp(new THREE.Vector3(15 - (row * 2.5), 3, -25 - (col * 4)), 0.1);
            } else s.visible = false;
        });

        renderer.render(scene, camera);
    }
    
    // Slider Listeners
    document.getElementById("l-in").oninput = e => state.lambda = +e.target.value;
    document.getElementById("i-in").oninput = e => state.interval = +e.target.value;
    document.getElementById("c-in").oninput = e => state.capacity = +e.target.value;

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.updateProjectionMatrix();
    });

    animate();
    updateDashboard();
</script>

</body>
</html>
