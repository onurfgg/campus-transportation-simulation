<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO 130 | 3D Operasyonel Dijital İkiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --accent: #3498db; --bg-glass: rgba(255, 255, 255, 0.85); --text: #2c3e50; }
        body { margin: 0; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: #cce0ff; }
        
        #canvas-container { position: absolute; width: 100vw; height: 100vh; z-index: 0; }

        .sidebar {
            position: absolute; top: 20px; left: 20px; width: 300px; z-index: 10;
            background: var(--bg-glass); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        h1 { font-size: 16px; margin: 0 0 15px 0; color: var(--text); border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        .val-disp { float: right; color: var(--accent); font-weight: 800; }

        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .kpi-box { background: white; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .kpi-title { font-size: 9px; color: #718096; font-weight: 800; letter-spacing: 0.5px; }
        .kpi-val { font-size: 20px; font-weight: 900; color: var(--text); margin-top: 2px; }

        #chart-container {
            position: absolute; bottom: 20px; left: 20px; width: 340px; height: 160px;
            background: var(--bg-glass); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 10px; z-index: 10; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        #status-tag { 
            display: inline-block; margin-top: 15px; padding: 6px 8px; border-radius: 6px; 
            font-size: 11px; font-weight: bold; color: white; width: 100%; text-align: center; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="sidebar">
    <h1>📊 EGO 130 Operasyonel İzleme</h1>
    
    <div class="control-group">
        <label>Varış Hızı (λ) <span class="val-disp" id="l-v">18</span></label>
        <input type="range" id="l-in" min="1" max="100" value="18">
    </div>
    <div class="control-group">
        <label>Sefer Sıklığı <span class="val-disp" id="i-v">3</span></label>
        <input type="range" id="i-in" min="1" max="15" value="3">
    </div>
    <div class="control-group">
        <label>Otobüs Kapasitesi <span class="val-disp" id="c-v">78</span></label>
        <input type="range" id="c-in" min="50" max="300" value="78">
    </div>

    <div class="kpi-grid">
        <div class="kpi-box">
            <div class="kpi-title">YOĞUNLUK (ρ)</div>
            <div class="kpi-val" id="rho-val">0.69</div>
        </div>
        <div class="kpi-box">
            <div class="kpi-title">KUYRUK</div>
            <div class="kpi-val" id="q-val">0</div>
        </div>
    </div>
    <div id="status-tag" style="background: #2ecc71;">✅ SİSTEM KARARLI</div>
</div>

<div id="chart-container"></div>

<script>
    // --- SİMÜLASYON VERİLERİ ---
    let state = { lambda: 18, interval: 3, capacity: 78, queue: 0, time: 0, history: [{t:0, q:0}] };
    let busState = "idle"; // idle, arriving, boarding, departing
    let busTimer = 0;

    // --- D3.js GRAFİK ---
    const chartW = 320, chartH = 140;
    const svgChart = d3.select("#chart-container").append("svg").attr("width", chartW).attr("height", chartH);
    const xChart = d3.scaleLinear().domain([0, 60]).range([30, chartW-10]);
    const yChart = d3.scaleLinear().domain([0, 200]).range([chartH-20, 10]);
    
    const xAxis = svgChart.append("g").attr("transform", `translate(0,${chartH-20})`).style("font-size", "9px").call(d3.axisBottom(xChart).ticks(6));
    const yAxis = svgChart.append("g").attr("transform", "translate(30,0)").style("font-size", "9px").call(d3.axisLeft(yChart).ticks(4));
    const linePath = svgChart.append("path").attr("fill", "none").attr("stroke", "#3498db").attr("stroke-width", 2.5);

    function updateDashboard() {
        const rho = (state.lambda * state.interval) / state.capacity;
        document.getElementById("l-v").innerText = state.lambda;
        document.getElementById("i-v").innerText = state.interval;
        document.getElementById("c-v").innerText = state.capacity;
        document.getElementById("q-val").innerText = Math.round(state.queue);
        document.getElementById("rho-val").innerText = rho.toFixed(2);

        const isUnstable = rho >= 1;
        const tag = document.getElementById("status-tag");
        tag.innerText = isUnstable ? "⚠️ DARBOĞAZ (SİSTEM İSTİKRARSIZ)" : "✅ SİSTEM KARARLI";
        tag.style.background = isUnstable ? "#e74c3c" : "#2ecc71";

        if(state.time > 60) xChart.domain([state.time - 60, state.time]);
        yChart.domain([0, Math.max(200, d3.max(state.history, d => d.q) * 1.15 || 0)]);
        xAxis.call(d3.axisBottom(xChart).ticks(6));
        yAxis.call(d3.axisLeft(yChart).ticks(4));
        linePath.datum(state.history).attr("d", d3.line().x(d => xChart(d.t)).y(d => yChart(d.q)));
    }

    // --- THREE.JS KURULUMU ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xddebf7);
    scene.fog = new THREE.Fog(0xddebf7, 100, 300);

    const camera = new THREE.OrthographicCamera(-70, 70, 40, -40, 1, 1000);
    camera.position.set(50, 60, 50); camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(30, 80, 40); sun.castShadow = true;
    scene.add(sun);

    // --- 3D MODELLER ---
    // Yol
    const road = new THREE.Mesh(new THREE.PlaneGeometry(1000, 40), new THREE.MeshStandardMaterial({color: 0x3d3d3d}));
    road.rotation.x = -Math.PI/2; road.receiveShadow = true; scene.add(road);
    
    const centerLine = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1), new THREE.MeshBasicMaterial({color: 0xffffff}));
    centerLine.rotation.x = -Math.PI/2; centerLine.position.y = 0.1; scene.add(centerLine);

    // Kaldırım
    const curb = new THREE.Mesh(new THREE.BoxGeometry(200, 2, 30), new THREE.MeshStandardMaterial({color: 0x95a5a6}));
    curb.position.set(0, 1, -35); curb.receiveShadow = true; scene.add(curb);

    // DURAK MİMARİSİ (Çatı ve Direkler eklendi)
    const roof = new THREE.Mesh(new THREE.BoxGeometry(45, 1, 15), new THREE.MeshStandardMaterial({color: 0x2c3e50}));
    roof.position.set(0, 14, -30); roof.castShadow = true; scene.add(roof);
    
    const poleGeo = new THREE.CylinderGeometry(0.5, 0.5, 12);
    const poleMat = new THREE.MeshStandardMaterial({color: 0x2c3e50});
    const p1 = new THREE.Mesh(poleGeo, poleMat); p1.position.set(-18, 8, -35); p1.castShadow = true; scene.add(p1);
    const p2 = new THREE.Mesh(poleGeo, poleMat); p2.position.set(18, 8, -35); p2.castShadow = true; scene.add(p2);

    // Otobüs Grubu
    const busGroup = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(40, 14, 12), new THREE.MeshStandardMaterial({color: 0xf1c40f}));
    body.position.y = 9; body.castShadow = true; busGroup.add(body);
    
    const glass = new THREE.Mesh(new THREE.BoxGeometry(38, 5, 12.5), new THREE.MeshStandardMaterial({color: 0x111111}));
    glass.position.y = 11; busGroup.add(glass);

    // DÜZELTİLMİŞ TEKERLEKLER (Geometri Z eksenine bakacak şekilde döndürüldü)
    const wheelGeo = new THREE.CylinderGeometry(3, 3, 2.5, 16);
    wheelGeo.rotateX(Math.PI / 2); // Artık tekerleklerin yüzü Z eksenine bakıyor!
    const wheelMat = new THREE.MeshStandardMaterial({color: 0x222222});
    const wheelRefs = [];
    
    [[-13, 3, 6], [13, 3, 6], [-13, 3, -6], [13, 3, -6]].forEach(p => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.position.set(...p); w.castShadow = true;
        busGroup.add(w); wheelRefs.push(w);
    });
    
    busGroup.position.set(-300, 0, 5); scene.add(busGroup);

    // Öğrenciler (2x2 Düzen)
    const students = [];
    const stuGeo = new THREE.CylinderGeometry(0.8, 0.8, 4, 8);
    const stuMat = new THREE.MeshStandardMaterial({color: 0x2980b9});
    for(let i=0; i<400; i++){
        const s = new THREE.Mesh(stuGeo, stuMat); s.castShadow = true; s.visible = false;
        scene.add(s); students.push(s);
    }

    // --- SİMÜLASYON DÖNGÜSÜ ---
    setInterval(() => {
        state.time++;
        state.queue += state.lambda;
        state.history.push({t: state.time, q: state.queue});
        
        if(state.time > 0 && state.time % state.interval === 0 && busState === "idle") {
            busState = "arriving";
        }
        updateDashboard();
    }, 1000);

    // --- 3D ANİMASYON VE FİZİK ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Otobüs Fiziği (İvmelenme/Fren ve Tekerlek Dönüşü)
        if(busState === "arriving"){
            let dist = 0 - busGroup.position.x;
            let speed = dist * 0.04;
            if(speed < 0.1) speed = 0.1; // Minimum yanaşma hızı
            
            if(busGroup.position.x >= -0.5) {
                busGroup.position.x = 0;
                busState = "boarding";
                setTimeout(() => {
                    state.queue = Math.max(0, state.queue - state.capacity);
                    busState = "departing";
                    busTimer = 0;
                }, 1200); // 1.2 saniye yolcu alma molası
            } else {
                busGroup.position.x += speed;
                // Tekerlekleri dönüş hızına göre çevir
                wheelRefs.forEach(w => w.rotation.z -= speed * 0.2);
            }
        } else if(busState === "departing") {
            busTimer += 0.03; // Giderek artan ivme
            let speed = busTimer;
            busGroup.position.x += speed;
            wheelRefs.forEach(w => w.rotation.z -= speed * 0.2);
            
            if(busGroup.position.x > 300) { 
                busGroup.position.x = -300; 
                busState = "idle"; 
                busTimer = 0; 
            }
        }

        // Öğrenci Pozisyonları (Yumuşak Sıra Kayması)
        students.forEach((s, i) => {
            if(i < state.queue) {
                s.visible = true;
                const row = Math.floor(i/2), col = i%2;
                // Öğrenciler tam çatının altına (Z=-28 ile -32 arasına) dizilir
                s.position.lerp(new THREE.Vector3(15 - (row * 3), 2, -28 - (col * 4)), 0.1);
            } else s.visible = false;
        });

        renderer.render(scene, camera);
    }
    
    // UI Dinleyicileri
    document.getElementById("l-in").oninput = e => { state.lambda = +e.target.value; updateDashboard(); };
    document.getElementById("i-in").oninput = e => { state.interval = +e.target.value; updateDashboard(); };
    document.getElementById("c-in").oninput = e => { state.capacity = +e.target.value; updateDashboard(); };

    window.addEventListener('resize', () => {
        const aspect = window.innerWidth / window.innerHeight;
        camera.left = -70 * aspect; camera.right = 70 * aspect;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
    updateDashboard();
</script>

</body>
</html>
