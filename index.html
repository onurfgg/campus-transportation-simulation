<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buz Hokeyi 2D | Canvas HTML5</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --ice-color: #e0f2fe;
            --line-color: #94a3b8;
            --player-color: #3b82f6;
            --ai-color: #ef4444;
            --puck-color: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        /* Modern Skor Tablosu */
        .scoreboard {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 28px;
            font-weight: 800;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        #player-score { color: var(--player-color); }
        #ai-score { color: var(--ai-color); }

        /* Oyun Alanı (Canvas) Stili */
        #gameCanvas {
            background-color: var(--ice-color);
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255,255,255,0.8);
            border: 8px solid #cbd5e1;
        }

        /* Yönlendirme Metni */
        .controls-info {
            position: absolute;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="score-box">
            <span class="score-label">Yapay Zeka</span>
            <span id="ai-score">0</span>
        </div>
        <div class="score-box" style="color: rgba(255,255,255,0.3);">|</div>
        <div class="score-box">
            <span class="score-label">Sen (Ok Tuşları)</span>
            <span id="player-score">0</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="controls-info">Kontrol: Klavyedeki OK TUŞLARINI (⬅️ ⬆️ ⬇️ ➡️) kullanın</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- OYUN NESNELERİ ---
        
        // Disk (Puck)
        const puck = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 12,
            mass: 1,
            vx: 0,
            vy: 0,
            color: "#1e293b",
            maxSpeed: 15,
            friction: 0.99 // Buz üzerindeki sürtünme (kayma hissi)
        };

        // Oyuncu (Sen)
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            radius: 20,
            mass: 5,
            vx: 0,
            vy: 0,
            speed: 6,
            color: "#3b82f6",
            score: 0
        };

        // Yapay Zeka (AI)
        const ai = {
            x: canvas.width / 2,
            y: 50,
            radius: 20,
            mass: 5,
            vx: 0,
            vy: 0,
            speed: 3.5, // AI hızı (Zorluğu belirler)
            color: "#ef4444",
            score: 0
        };

        const goalWidth = 120;

        // Klavye Kontrolleri
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        window.addEventListener("keydown", (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
                e.preventDefault(); // Sayfanın kaymasını engelle
            }
        });

        window.addEventListener("keyup", (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
            }
        });

        // --- ÇİZİM FONKSİYONLARI ---

        function drawSaha() {
            // Orta Çizgi
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "#ef4444";
            ctx.lineWidth = 4;
            ctx.stroke();

            // Orta Yuvarlak
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 50, 0, Math.PI * 2);
            ctx.strokeStyle = "#ef4444";
            ctx.stroke();
            
            // Başlama Noktası
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 5, 0, Math.PI * 2);
            ctx.fillStyle = "#ef4444";
            ctx.fill();

            // AI Kalesi (Üst)
            ctx.beginPath();
            ctx.rect((canvas.width - goalWidth) / 2, 0, goalWidth, 10);
            ctx.fillStyle = "#ef4444";
            ctx.fill();

            // Oyuncu Kalesi (Alt)
            ctx.beginPath();
            ctx.rect((canvas.width - goalWidth) / 2, canvas.height - 10, goalWidth, 10);
            ctx.fillStyle = "#3b82f6";
            ctx.fill();
        }

        function drawCircle(obj, isPuck = false) {
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
            ctx.fillStyle = obj.color;
            ctx.fill();
            
            // Eğer disk değilse vuruş tokmağı (mallet) hissi vermek için iç halka çiz
            if (!isPuck) {
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.fill();
            }
        }

        // --- FİZİK VE MATEMATİK ---

        // İki daire arası çarpışma (Elastic Collision)
        function checkCollision(circle1, circle2) {
            let dx = circle2.x - circle1.x;
            let dy = circle2.y - circle1.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < circle1.radius + circle2.radius) {
                // Çarpışma açısını bul
                let angle = Math.atan2(dy, dx);
                let sin = Math.sin(angle);
                let cos = Math.cos(angle);

                // İç içe geçmeyi engellemek için pozisyon düzeltmesi (Position Resolution)
                let overlap = circle1.radius + circle2.radius - distance;
                let forceRatio = 0.5; // Gücün aktarım oranı
                
                // Eğer çarpan şey disk ise onu dışarı it
                if(circle2 === puck) {
                    puck.x += cos * overlap;
                    puck.y += sin * overlap;
                    
                    // Momentumu aktar (Tokmağın hızını diske ilet)
                    puck.vx += circle1.vx * forceRatio;
                    puck.vy += circle1.vy * forceRatio;

                    // Hız limitini koru
                    let currentSpeed = Math.sqrt(puck.vx**2 + puck.vy**2);
                    if(currentSpeed > puck.maxSpeed) {
                        puck.vx = (puck.vx / currentSpeed) * puck.maxSpeed;
                        puck.vy = (puck.vy / currentSpeed) * puck.maxSpeed;
                    }
                }
            }
        }

        // --- OYUN DÖNGÜSÜ ---

        function resetPuck(scorer) {
            puck.x = canvas.width / 2;
            puck.y = canvas.height / 2;
            puck.vx = 0;
            puck.vy = scorer === 'player' ? -3 : 3; // Golü yiyen tarafa doğru yavaşça başla
            
            // Oyuncuları başlangıç noktasına al
            player.x = canvas.width / 2; player.y = canvas.height - 50;
            ai.x = canvas.width / 2; ai.y = 50;
        }

        function update() {
            // 1. Oyuncu Hareketi (Ok Tuşları)
            player.vx = 0;
            player.vy = 0;
            if (keys.ArrowLeft) player.vx = -player.speed;
            if (keys.ArrowRight) player.vx = player.speed;
            if (keys.ArrowUp) player.vy = -player.speed;
            if (keys.ArrowDown) player.vy = player.speed;

            player.x += player.vx;
            player.y += player.vy;

            // Oyuncu Sınırları (Sadece kendi sahasında hareket edebilir)
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(canvas.height / 2 + player.radius, Math.min(canvas.height - player.radius, player.y));

            // 2. Yapay Zeka Hareketi
            let aiTargetX = puck.x;
            // Disk kendi sahasındaysa diske git, değilse kaleyi korumaya merkeze dön
            if (puck.y < canvas.height / 2) {
                if (ai.x < aiTargetX - 10) ai.vx = ai.speed;
                else if (ai.x > aiTargetX + 10) ai.vx = -ai.speed;
                else ai.vx = 0;
                
                // Diski ileri itmek için Y ekseninde de hafif hareket
                if (ai.y < puck.y - 10) ai.vy = ai.speed;
                else if (ai.y > puck.y + 10) ai.vy = -ai.speed;
                else ai.vy = 0;
            } else {
                // Kaleye dön
                if (ai.x < canvas.width / 2 - 10) ai.vx = ai.speed * 0.5;
                else if (ai.x > canvas.width / 2 + 10) ai.vx = -ai.speed * 0.5;
                else ai.vx = 0;
                
                if (ai.y > 50) ai.vy = -ai.speed * 0.5;
                else ai.vy = 0;
            }

            ai.x += ai.vx;
            ai.y += ai.vy;

            // AI Sınırları
            ai.x = Math.max(ai.radius, Math.min(canvas.width - ai.radius, ai.x));
            ai.y = Math.max(ai.radius, Math.min(canvas.height / 2 - ai.radius, ai.y));

            // 3. Disk (Puck) Fiziği
            puck.vx *= puck.friction;
            puck.vy *= puck.friction;
            puck.x += puck.vx;
            puck.y += puck.vy;

            // Diskin Duvarlardan Sekmesi (Kenarlar)
            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; }

            // Üst ve Alt Duvarlardan Sekme / Gol Olma Durumu
            const isInsideGoalWidth = puck.x > (canvas.width - goalWidth) / 2 && puck.x < (canvas.width + goalWidth) / 2;

            if (puck.y - puck.radius < 0) {
                if (isInsideGoalWidth) {
                    player.score++;
                    document.getElementById("player-score").innerText = player.score;
                    resetPuck('player');
                } else {
                    puck.y = puck.radius;
                    puck.vy *= -1;
                }
            }

            if (puck.y + puck.radius > canvas.height) {
                if (isInsideGoalWidth) {
                    ai.score++;
                    document.getElementById("ai-score").innerText = ai.score;
                    resetPuck('ai');
                } else {
                    puck.y = canvas.height - puck.radius;
                    puck.vy *= -1;
                }
            }

            // Çarpışmaları Kontrol Et
            checkCollision(player, puck);
            checkCollision(ai, puck);
        }

        function gameLoop() {
            // Ekranı temizle
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Çizimler
            drawSaha();
            drawCircle(player);
            drawCircle(ai);
            drawCircle(puck, true);

            // Mantık
            update();

            // Döngü
            requestAnimationFrame(gameLoop);
        }

        // Oyunu Başlat
        gameLoop();

    </script>
</body>
</html>
