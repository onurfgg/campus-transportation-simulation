<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO 130 | Operasyonel Dijital İkiz</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* Modern ve Temiz Tasarım (Screenshot ile uyumlu) */
        :root { 
            --safe: #2ecc71; 
            --danger: #e74c3c; 
            --dark: #34495e; 
            --bg: #f8f9fa;
            --text: #2c3e50;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); }
        .dashboard { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        
        /* Üst Başlık ve Durum */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; margin-bottom: 25px; }
        h1 { font-size: 22px; margin: 0; display: flex; align-items: center; gap: 10px; }
        .status-badge { padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; color: white; background: var(--safe); transition: 0.3s; }

        /* Kontrol Paneli (Slider'lar) */
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; background: #fdfdfd; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #edf2f7; }
        .slider-group { display: flex; flex-direction: column; }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; color: #4a5568; margin-bottom: 10px; }
        .slider-val { color: #3182ce; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #34495e; }

        /* KPI Kartları */
        .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .kpi-card { padding: 25px; border-radius: 10px; color: white; text-align: center; transition: background-color 0.4s; display: flex; flex-direction: column; justify-content: center; }
        .kpi-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; opacity: 0.9; }
        .kpi-value { font-size: 42px; font-weight: 800; line-height: 1; }

        /* Animasyon Alanı (ViewBox ile tam uyumlu) */
        .animation-container { width: 100%; background: #e2e8f0; border-radius: 10px; overflow: hidden; position: relative; margin-bottom: 25px; border: 1px solid #cbd5e0; }
        .road-bg { position: absolute; bottom: 0; width: 100%; height: 25%; background: #4a5568; }
        svg.stage { width: 100%; height: auto; display: block; position: relative; z-index: 2; }

        /* Grafik Alanı */
        #chart-container { width: 100%; height: 300px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>🚌 EGO 130 Hacettepe | Operasyonel Dijital İkiz</h1>
        <div id="sys-status" class="status-badge">✅ SİSTEM KARARLI</div>
    </header>

    <div class="controls">
        <div class="slider-group">
            <div class="slider-header">
                <span>Varış Hızı (λ)</span>
                <span class="slider-val"><span id="l-v">18</span> öğr/dk</span>
            </div>
            <input type="range" id="l-in" min="1" max="50" value="18">
        </div>
        <div class="slider-group">
            <div class="slider-header">
                <span>Sefer Sıklığı</span>
                <span class="slider-val"><span id="i-v">3</span> dk</span>
            </div>
            <input type="range" id="i-in" min="1" max="15" value="3">
        </div>
        <div class="slider-group">
            <div class="slider-header">
                <span>Otobüs Kapasitesi</span>
                <span class="slider-val"><span id="c-v">78</span> kişi</span>
            </div>
            <input type="range" id="c-in" min="50" max="200" value="78">
        </div>
    </div>

    <div class="kpi-row">
        <div class="kpi-card" id="rho-card" style="background: var(--safe);">
            <div class="kpi-title">Trafik Yoğunluğu (ρ)</div>
            <div class="kpi-value" id="rho-val">0.69</div>
        </div>
        <div class="kpi-card" id="q-card" style="background: var(--dark);">
            <div class="kpi-title">Bekleyen Öğrenci</div>
            <div class="kpi-value" id="q-val">0</div>
        </div>
    </div>

    <div class="animation-container">
        <div class="road-bg"></div>
        <svg class="stage" id="stage" viewBox="0 0 1000 250">
            <rect x="450" y="180" width="100" height="8" fill="#ecc94b" rx="4"></rect>
            <g id="students-group"></g>
        </svg>
    </div>

    <div id="chart-container"></div>
</div>

<script>
    // --- Başlangıç Durumu (Görselinizdeki değerler) ---
    let state = { 
        lambda: 18, 
        interval: 3, 
        capacity: 78, 
        queue: 0, 
        time: 0, 
        history: [{t: 0, q: 0}] 
    };

    // --- D3 Grafik Kurulumu ---
    const chartDiv = document.getElementById("chart-container");
    const margin = {top: 20, right: 30, bottom: 30, left: 50};
    let width = chartDiv.clientWidth - margin.left - margin.right;
    const height = 300 - margin.top - margin.bottom;

    const svgChart = d3.select("#chart-container").append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
      .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    const x = d3.scaleLinear().domain([0, 60]).range([0, width]);
    const y = d3.scaleLinear().domain([0, 200]).range([height, 0]);

    const xAxis = svgChart.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x).tickFormat(d => d + "m"));
    const yAxis = svgChart.append("g").call(d3.axisLeft(y));
    
    // Testere dişi (Sawtooth) görünümü için eğri tipini değiştirmiyoruz, doğrudan noktaları bağlıyoruz
    const line = d3.line().x(d => x(d.t)).y(d => y(d.q));
    const path = svgChart.append("path").attr("fill", "none").attr("stroke", "#3182ce").attr("stroke-width", 3);

    // --- Temel Fonksiyonlar ---
    
    // 1. Arayüzü ve KPI'ları Güncelle
    function updateUI() {
        // Formül: rho = (Varış * Sıklık) / Kapasite
        const rho = (state.lambda * state.interval) / state.capacity;
        
        // Metinleri Güncelle
        d3.select("#l-v").text(state.lambda);
        d3.select("#i-v").text(state.interval);
        d3.select("#c-v").text(state.capacity);
        d3.select("#q-val").text(Math.round(state.queue));
        d3.select("#rho-val").text(rho.toFixed(2));

        // Durum Kontrolü (Darboğaz)
        const isUnstable = rho >= 1;
        const statusBadge = d3.select("#sys-status");
        const rhoCard = d3.select("#rho-card");

        if(isUnstable) {
            statusBadge.text("⚠️ SİSTEM İSTİKRARSIZ").style("background", "var(--danger)");
            rhoCard.style("background", "var(--danger)");
        } else {
            statusBadge.text("✅ SİSTEM KARARLI").style("background", "var(--safe)");
            rhoCard.style("background", "var(--safe)");
        }

        // Grafiği Güncelle
        // Zaman 60'ı geçerse grafiği kaydır
        if(state.time > 60) {
            x.domain([state.time - 60, state.time]);
            xAxis.call(d3.axisBottom(x).tickFormat(d => d + "m"));
        }
        
        // Y eksenini dinamik ölçeklendir (Maksimum kuyruğa göre)
        const maxQ = d3.max(state.history, d => d.q);
        if(maxQ > 200) {
            y.domain([0, maxQ * 1.2]);
            yAxis.call(d3.axisLeft(y));
        }

        path.datum(state.history).attr("d", line);
    }

    // 2. Öğrencileri Çiz (Animasyon Sahnesi)
    function renderStudents() {
        const studentGroup = d3.select("#students-group");
        // Ekrana çok fazla nokta çizip tarayıcıyı yormamak için görsel sayıyı limitliyoruz
        const visualCount = Math.min(Math.floor(state.queue), 400); 
        
        const dotsData = Array.from({length: visualCount}, (_, i) => {
            // Öğrencileri durak etrafında bir ızgara (grid) şeklinde dizer
            const cols = 20;
            const row = Math.floor(i / cols);
            const col = i % cols;
            return {
                id: i,
                x: 410 + (col * 8), // Durağın merkezi 500 civarı
                y: 172 - (row * 8)  // Yukarı doğru birikirler
            };
        });

        const dots = studentGroup.selectAll(".student").data(dotsData, d => d.id);
        
        dots.enter()
            .append("circle")
            .attr("class", "student")
            .attr("r", 3)
            .attr("fill", "#a0aec0")
            .attr("cx", d => d.x)
            .attr("cy", d => d.y)
            .attr("opacity", 0)
            .transition().duration(300).attr("opacity", 1);
            
        dots.exit().remove();
    }

    // 3. Otobüs Animasyonu
    function animateBus() {
        const stage = d3.select("#stage");
        
        // Otobüs Grubu
        const bus = stage.append("g").attr("transform", "translate(-150, 115)");
        
        // Otobüs Gövdesi
        bus.append("rect").attr("width", 140).attr("height", 65).attr("rx", 8).attr("fill", "#ecc94b");
        // Otobüs Camı
        bus.append("rect").attr("width", 110).attr("height", 25).attr("x", 20).attr("y", 10).attr("rx", 4).attr("fill", "#2d3748").attr("opacity", 0.6);
        // Tekerlekler
        bus.append("circle").attr("cx", 30).attr("cy", 80).attr("r", 12).attr("fill", "#1a202c");
        bus.append("circle").attr("cx", 110).attr("cy", 80).attr("r", 12).attr("fill", "#1a202c");

        // Animasyon Sekansı
        bus.transition()
            .duration(1000)
            .ease(d3.easeCubicOut)
            .attr("transform", "translate(430, 115)") // Durağa yanaşır
            .on("end", () => {
                // Yolcuları alır
                let boarded = Math.min(state.queue, state.capacity);
                state.queue -= boarded;
                
                // Grafiğe keskin düşüş (boarded) noktasını ekle
                state.history.push({t: state.time, q: state.queue});
                
                renderStudents();
                updateUI();

                // Otobüs Gider
                bus.transition()
                    .delay(600) // Yolcu binme süresi beklemesi
                    .duration(1000)
                    .ease(d3.easeCubicIn)
                    .attr("transform", "translate(1100, 115)")
                    .remove();
            });
    }

    // --- Simülasyon Ana Döngüsü (Her Saniye 1 Dakikadır) ---
    setInterval(() => {
        state.time++;
        
        // Yeni yolcular gelir
        state.queue += state.lambda;
        state.history.push({t: state.time, q: state.queue});
        
        // Otobüs zamanı geldi mi?
        if (state.time > 0 && state.time % state.interval === 0) {
            animateBus();
            // Not: Kuyruğun düşmesi (boarded işlemi) animateBus() içindeki on("end") kısmında yapılıyor
        }

        renderStudents();
        updateUI();
    }, 1000);

    // --- Slider Event Listeners ---
    d3.select("#l-in").on("input", function() { state.lambda = +this.value; updateUI(); });
    d3.select("#i-in").on("input", function() { state.interval = +this.value; updateUI(); });
    d3.select("#c-in").on("input", function() { state.capacity = +this.value; updateUI(); });

    // Sayfa yüklendiğinde ilk tetikleme
    updateUI();

    // Ekran boyutu değiştiğinde grafiği responsive yapmak
    window.addEventListener('resize', () => {
        width = chartDiv.clientWidth - margin.left - margin.right;
        svgChart.attr("width", width + margin.left + margin.right);
        x.range([0, width]);
        xAxis.call(d3.axisBottom(x).tickFormat(d => d + "m"));
        updateUI();
    });
</script>

</body>
</html>
