<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO 130 | 3D Dijital İkiz Simülasyonu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --danger: #e74c3c; --safe: #2ecc71; --dark: #2c3e50; --bg: rgba(255, 255, 255, 0.9); }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #87CEEB; }
        
        /* 3D Canvas'ın Arkada Kalması İçin */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        
        /* Arayüzün Üstte Görünmesi İçin */
        #ui-layer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; z-index: 10; pointer-events: none; }
        .panel { background: var(--bg); padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(5px); pointer-events: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; }
        h1 { margin: 0; font-size: 18px; color: var(--dark); }
        #status-badge { padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; color: white; background: var(--safe); }
        
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 15px; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .val-tag { color: #3498db; }
        
        .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { padding: 15px; border-radius: 8px; text-align: center; color: white; transition: 0.3s; }
        .card-title { font-size: 11px; text-transform: uppercase; opacity: 0.9; }
        .card-val { font-size: 24px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
    <div class="panel">
        <header>
            <h1>🚌 EGO 130 Hacettepe | 3D Operasyonel Analizör</h1>
            <div id="status-badge">✅ SİSTEM KARARLI</div>
        </header>
        
        <div class="controls">
            <div class="group">
                <label>Varış Hızı (λ): <span class="val-tag" id="l-v">18</span> öğr/dk</label>
                <input type="range" id="l-in" min="1" max="100" value="18">
            </div>
            <div class="group">
                <label>Sefer Sıklığı: <span class="val-tag" id="i-v">3</span> dk</label>
                <input type="range" id="i-in" min="1" max="15" value="3">
            </div>
            <div class="group">
                <label>Otobüs Kapasitesi: <span class="val-tag" id="c-v">78</span> kişi</label>
                <input type="range" id="c-in" min="50" max="200" value="78">
            </div>
        </div>

        <div class="kpi-row">
            <div class="card" id="rho-card" style="background: var(--safe);">
                <div class="card-title">Trafik Yoğunluğu (ρ)</div>
                <div class="card-val" id="rho-val">0.69</div>
            </div>
            <div class="card" style="background: var(--dark);">
                <div class="card-title">Kuyruktaki Öğrenci</div>
                <div class="card-val" id="q-val">0</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- SİMÜLASYON VERİLERİ ---
    let config = { lambda: 18, interval: 3, capacity: 78, queue: 0, time: 0 };
    let studentMeshes = [];
    let busState = "idle"; // idle, arriving, boarding, departing

    // --- ARAYÜZ GÜNCELLEME ---
    function updateUI() {
        const rho = (config.lambda * config.interval) / config.capacity;
        document.getElementById("l-v").innerText = config.lambda;
        document.getElementById("i-v").innerText = config.interval;
        document.getElementById("c-v").innerText = config.capacity;
        document.getElementById("q-val").innerText = config.queue;
        document.getElementById("rho-val").innerText = rho.toFixed(2);

        const isFail = rho >= 1;
        document.getElementById("rho-card").style.background = isFail ? "var(--danger)" : "var(--safe)";
        const badge = document.getElementById("status-badge");
        badge.innerText = isFail ? "⚠️ DARBOĞAZ" : "✅ SİSTEM KARARLI";
        badge.style.background = isFail ? "var(--danger)" : "var(--safe)";
    }

    document.getElementById("l-in").addEventListener("input", e => { config.lambda = +e.target.value; updateUI(); });
    document.getElementById("i-in").addEventListener("input", e => { config.interval = +e.target.value; updateUI(); });
    document.getElementById("c-in").addEventListener("input", e => { config.capacity = +e.target.value; updateUI(); });

    // --- THREE.JS 3D MOTOR KURULUMU ---
    const container = document.getElementById("canvas-container");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdceaf5); // Açık mavi gökyüzü

    // Kamera (İzometrik Bakış)
    const aspect = window.innerWidth / window.innerHeight;
    const d = 50;
    const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
    camera.position.set(50, 50, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // Işıklandırma
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(20, 50, 20);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // --- 3D OBJELERİ OLUŞTURMA ---
    // 1. Zemin (Asfalt)
    const roadGeo = new THREE.PlaneGeometry(200, 40);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x3d3d3d });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.receiveShadow = true;
    scene.add(road);

    // 2. Durak Kaldırımı
    const stopGeo = new THREE.BoxGeometry(60, 2, 40);
    const stopMat = new THREE.MeshStandardMaterial({ color: 0xbdc3c7 });
    const stopArea = new THREE.Mesh(stopGeo, stopMat);
    stopArea.position.set(0, 1, -20);
    stopArea.receiveShadow = true;
    scene.add(stopArea);

    // 3. Otobüs (Sarı EGO)
    const busGroup = new THREE.Group();
    const busBodyGeo = new THREE.BoxGeometry(30, 12, 10);
    const busBodyMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
    const busBody = new THREE.Mesh(busBodyGeo, busBodyMat);
    busBody.castShadow = true;
    busBody.position.y = 7;
    busGroup.add(busBody);
    
    // Otobüs Camı
    const windowGeo = new THREE.BoxGeometry(20, 5, 10.2);
    const windowMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
    const busWindow = new THREE.Mesh(windowGeo, windowMat);
    busWindow.position.set(2, 9, 0);
    busGroup.add(busWindow);

    busGroup.position.set(-100, 0, 5); // Başlangıç pozisyonu (Ekran dışı sol)
    scene.add(busGroup);

    // --- SİMÜLASYON MANTIĞI ---
    // Öğrenci (Silindir) Oluşturucu
    function addStudentTo3D(index) {
        // Çok fazla obje tarayıcıyı yormasın diye maksimum görsel sınırı koyuyoruz
        if(studentMeshes.length > 300) return; 

        const stuGeo = new THREE.CylinderGeometry(0.8, 0.8, 4, 8);
        const stuMat = new THREE.MeshStandardMaterial({ color: 0x3498db });
        const student = new THREE.Mesh(stuGeo, stuMat);
        student.castShadow = true;

        // Izgara (Grid) şeklinde dizilim
        const cols = 15;
        const row = Math.floor(index / cols);
        const col = index % cols;
        
        student.position.set(-20 + (col * 2.5), 3, -10 - (row * 2.5));
        scene.add(student);
        studentMeshes.push(student);
    }

    // Ana Döngü (Her Saniye = 1 Dakika)
    setInterval(() => {
        config.time++;
        
        // Yeni öğrenciler varış hızı kadar sıraya girer
        for(let i=0; i<config.lambda; i++) {
            addStudentTo3D(config.queue + i);
        }
        config.queue += config.lambda;

        // Otobüs sefer zamanı geldiyse
        if(config.time > 0 && config.time % config.interval === 0 && busState === "idle") {
            busState = "arriving";
        }

        updateUI();
    }, 1000);

    // --- 3D ANİMASYON DÖNGÜSÜ (60 FPS) ---
    function animate() {
        requestAnimationFrame(animate);

        // Otobüs Hareket Mantığı
        if(busState === "arriving") {
            busGroup.position.x += 1.5; // Sağa doğru gel
            if(busGroup.position.x >= 0) { // Durağa ulaştı
                busGroup.position.x = 0;
                busState = "boarding";
                
                // Bekleme süresi ve yolcu alma
                setTimeout(() => {
                    let boarded = Math.min(config.queue, config.capacity);
                    config.queue -= boarded;
                    
                    // Binen öğrencilerin 3D objelerini sil
                    for(let i = 0; i < boarded; i++) {
                        if(studentMeshes.length > 0) {
                            let s = studentMeshes.pop();
                            scene.remove(s);
                        }
                    }
                    updateUI();
                    busState = "departing";
                }, 1000);
            }
        } else if (busState === "departing") {
            busGroup.position.x += 1.5; // Gitmeye devam et
            if(busGroup.position.x > 100) {
                busState = "idle";
                busGroup.position.x = -100; // Sola geri dön
            }
        }

        renderer.render(scene, camera);
    }

    // Pencere boyutu değiştiğinde
    window.addEventListener('resize', () => {
        const aspect = window.innerWidth / window.innerHeight;
        camera.left = -d * aspect;
        camera.right = d * aspect;
        camera.top = d;
        camera.bottom = -d;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();
    animate();
</script>

</body>
</html>
