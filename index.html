<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO 130 | Gelişmiş Dijital İkiz</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --danger: #e74c3c; --safe: #2ecc71; --primary: #3498db; --dark: #2c3e50; }
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; }
        .dashboard { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { font-size: 20px; margin: 0; color: var(--dark); }
        
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #666; }
        input[type=range] { width: 100%; accent-color: var(--primary); }
        .val-tag { color: var(--primary); font-weight: 800; }

        .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .card { padding: 15px; border-radius: 10px; color: white; text-align: center; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-label { font-size: 11px; text-transform: uppercase; opacity: 0.8; font-weight: 600; }
        .card-val { font-size: 26px; font-weight: 800; margin-top: 5px; }

        #animation-box { position: relative; width: 100%; height: 200px; background: #dfe4ea; border-radius: 10px; overflow: hidden; border: 2px solid #ced4da; }
        .road { position: absolute; bottom: 0; width: 100%; height: 50px; background: #3d3d3d; }
        .stop-mark { position: absolute; bottom: 50px; left: 45%; width: 10%; height: 6px; background: #f1c40f; border-radius: 3px 3px 0 0; }

        #chart-box { width: 100%; height: 260px; margin-top: 10px; }
        .student { stroke: #fff; stroke-width: 0.5; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>🚌 EGO 130 Hacettepe | Operasyonel Dijital İkiz</h1>
        <div id="status-badge" style="font-size: 12px; font-weight: bold; color: #666;">SİSTEM AKTİF</div>
    </header>

    <div class="controls">
        <div class="group">
            <label>Varış Hızı (λ): <span class="val-tag" id="l-v">30</span> öğr/dk</label>
            <input type="range" id="l-in" min="10" max="60" value="30">
        </div>
        <div class="group">
            <label>Sefer Sıklığı: <span class="val-tag" id="i-v">5</span> dk</label>
            <input type="range" id="i-in" min="2" max="15" value="5">
        </div>
        <div class="group">
            <label>Otobüs Kapasitesi: <span class="val-tag" id="c-v">120</span> kişi</label>
            <input type="range" id="c-in" min="50" max="150" value="120">
        </div>
    </div>

    <div class="kpi-row">
        <div class="card" id="rho-card" style="background: var(--safe);">
            <div class="card-label">Trafik Yoğunluğu (ρ)</div>
            <div class="card-val" id="rho-val">1.25</div>
        </div>
        <div class="card" id="q-card" style="background: #34495e;">
            <div class="card-label">Bekleyen Öğrenci</div>
            <div class="card-val" id="q-val">0</div>
        </div>
    </div>

    <div id="animation-box">
        <div class="road"></div>
        <div class="stop-mark"></div>
        <svg id="stage" width="100%" height="200"></svg>
    </div>

    <div id="chart-box"></div>
</div>

<script>
    // --- State & Config ---
    let config = { lambda: 30, interval: 5, capacity: 120, queue: 0, time: 0, history: [] };
    const stage = d3.select("#stage");
    const chartBox = d3.select("#chart-box");
    
    // Grafik Hazırlığı
    const margin = {top: 15, right: 30, bottom: 30, left: 45};
    let width = document.querySelector("#chart-box").clientWidth - margin.left - margin.right;
    const height = 260 - margin.top - margin.bottom;

    const svg = chartBox.append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
      .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    const x = d3.scaleLinear().domain([0, 60]).range([0, width]);
    const y = d3.scaleLinear().domain([0, 250]).range([height, 0]);

    svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x).ticks(10).tickFormat(d => d + "m"));
    const yAxis = svg.append("g").call(d3.axisLeft(y));
    const path = svg.append("path").attr("fill", "none").attr("stroke", "#3498db").attr("stroke-width", 3);

    // --- Core Logic ---
    function updateDashboard() {
        const rho = (config.lambda * config.interval) / config.capacity;
        d3.select("#l-v").text(config.lambda);
        d3.select("#i-v").text(config.interval);
        d3.select("#c-v").text(config.capacity);
        d3.select("#q-val").text(Math.round(config.queue));
        d3.select("#rho-val").text(rho.toFixed(2));

        const isFail = rho >= 1;
        d3.select("#rho-card").style("background", isFail ? "var(--danger)" : "var(--safe)");
        d3.select("#status-badge").text(isFail ? "⚠️ KRİTİK DARBOĞAZ" : "✅ SİSTEM KARARLI").style("color", isFail ? "var(--danger)" : "var(--safe)");

        // Grafik Güncelleme
        y.domain([0, Math.max(250, d3.max(config.history, d => d.q) * 1.2 || 0)]);
        yAxis.transition().duration(300).call(d3.axisLeft(y));
        path.datum(config.history).attr("d", d3.line().x(d => x(d.t)).y(d => y(d.q)));
    }

    function renderStudents() {
        // SVG genişliğini anlık alarak yerleşimi hesapla
        const stageW = document.querySelector("#stage").clientWidth;
        const waitX = stageW * 0.5; // Durak merkezi
        
        const count = Math.min(Math.floor(config.queue / 4), 200); // Temsili nokta sayısı
        const studentData = Array.from({length: count}, (_, i) => ({
            id: i,
            x: waitX + (i % 15) * 7 - 50,
            y: 140 - Math.floor(i / 15) * 7
        }));

        const circles = stage.selectAll(".student").data(studentData, d => d.id);
        circles.enter().append("circle").attr("class", "student")
            .attr("r", 2.5).attr("fill", "#95a5a6")
            .attr("cx", d => d.x).attr("cy", d => d.y);
        circles.exit().remove();
    }

    function spawnBus() {
        const stageW = document.querySelector("#stage").clientWidth;
        const stopPos = stageW * 0.45;

        const bus = stage.append("g");
        bus.append("rect").attr("width", 90).attr("height", 38).attr("rx", 6).attr("fill", "#f1c40f");
        bus.append("rect").attr("width", 20).attr("height", 25).attr("x", 65).attr("y", 5).attr("fill", "#34495e").attr("opacity", 0.3); // Cam
        
        bus.attr("transform", `translate(-100, 155)`)
           .transition().duration(800).ease(d3.easeQuadOut).attr("transform", `translate(${stopPos}, 155)`) // Durağa gel
           .transition().delay(1200).duration(800).ease(d3.easeQuadIn).attr("transform", `translate(${stageW + 100}, 155)`) // Git
           .remove();

        // Öğrenciler otobüse biner
        setTimeout(() => {
            let boarded = Math.min(config.queue, config.capacity);
            config.queue -= boarded;
            renderStudents();
            updateDashboard();
        }, 1200);
    }

    // --- Main Loop ---
    setInterval(() => {
        config.time++;
        if(config.time > 60) { config.time = 0; config.history = []; config.queue = 0; }

        config.queue += config.lambda;
        config.history.push({t: config.time, q: config.queue});

        if(config.time % config.interval === 0) spawnBus();

        renderStudents();
        updateDashboard();
    }, 1000);

    // --- Listeners ---
    d3.select("#l-in").on("input", function() { config.lambda = +this.value; updateDashboard(); });
    d3.select("#i-in").on("input", function() { config.interval = +this.value; updateDashboard(); });
    d3.select("#c-in").on("input", function() { config.capacity = +this.value; updateDashboard(); });

    updateDashboard();
</script>

</body>
</html>
